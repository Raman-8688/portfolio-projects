<div class="app-root" [class.dark]="ps.isDarkMode()">
  <app-navbar></app-navbar>
  <app-settings-panel></app-settings-panel>

  <!-- Global Sticky Social Sidebar -->
  <aside class="social-sidebar" aria-label="Social links">
    <a
      *ngFor="let link of ps.socialLinks"
      [href]="link.url"
      [title]="link.label"
      target="_blank"
      rel="noopener noreferrer"
      class="social-link"
    >
      <i [class]="link.icon"></i>
      <span class="social-tooltip">{{ link.label }}</span>
    </a>
    <div class="social-line"></div>
  </aside>

  <main class="main-content">
    <app-hero id="home"></app-hero>
    <app-about id="about"></app-about>
    <app-skills id="skills"></app-skills>
    <app-experience id="experience"></app-experience>
    <app-architecture-showcase id="architecture"></app-architecture-showcase>
    <app-projects id="projects"></app-projects>
    <app-devops-deployment id="devops"></app-devops-deployment>
    <app-github-stats id="github"></app-github-stats>
    <app-contact id="contact"></app-contact>
  </main>

  <app-footer></app-footer>
</div>
