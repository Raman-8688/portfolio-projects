<div class="app-root" [class.dark]="ps.isDarkMode()">
  <app-navbar></app-navbar>
  <app-settings-panel></app-settings-panel>

  <main class="main-content">
    <div *ngIf="ps.activeSection() === 'home'">
      <app-hero></app-hero>
    </div>
    <div *ngIf="ps.activeSection() === 'about'">
      <app-about></app-about>
    </div>
    <div *ngIf="ps.activeSection() === 'experience'">
      <app-experience></app-experience>
    </div>
    <div *ngIf="ps.activeSection() === 'skills'">
      <app-skills></app-skills>
    </div>
    <div *ngIf="ps.activeSection() === 'projects'">
      <app-projects></app-projects>
    </div>
    <div *ngIf="ps.activeSection() === 'contact'">
      <app-contact></app-contact>
    </div>
  </main>

  <app-footer></app-footer>
</div>
