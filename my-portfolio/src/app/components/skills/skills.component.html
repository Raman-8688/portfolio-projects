<section class="skills-section">
  <div class="section-container">

    <div class="section-header" [class.visible]="headerVisible">
      <span class="section-tag">What I Know</span>
      <h2 class="section-title">Technical <span class="accent">Arsenal</span></h2>
      <p class="section-sub">Technologies I work with daily to build scalable enterprise applications</p>
      <div class="title-line"></div>
    </div>

    <div class="categories-grid">
      <div
        class="category-panel glass-card"
        *ngFor="let cat of skillCategories; let ci = index"
        [class.visible]="panelsVisible[ci]"
        [style.--cat-color]="cat.color"
      >
        <div class="panel-header">
          <h3 class="cat-name" [style.color]="cat.color">{{ cat.title }}</h3>
          <div class="cat-underline" [style.background]="'linear-gradient(90deg,' + cat.color + ', ' + cat.color2 + ')'"></div>
        </div>
        <div class="corner-dot" [style.background]="cat.color"></div>

        <div class="tech-grid">
          <div
            class="tech-item"
            *ngFor="let tech of cat.techs; let ti = index"
            [class.visible]="panelsVisible[ci]"
            [style.animation-delay]="(ci * 0.08 + ti * 0.05) + 's'"
          >
            <div class="tech-icon-wrap" [style.background]="tech.bg">
              <img *ngIf="tech.img" [src]="tech.img" [alt]="tech.name" class="tech-img" />
              <i *ngIf="!tech.img && tech.icon" [class]="tech.icon" [style.color]="tech.iconColor || '#fff'" style="font-size:20px"></i>
              <span *ngIf="!tech.img && !tech.icon" class="tech-letter" [style.color]="tech.letterColor || '#fff'">{{ tech.letter }}</span>
            </div>
            <span class="tech-name">{{ tech.name }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="build-callout glass-card" [class.visible]="calloutVisible">
      <div class="callout-left">
        <div class="callout-icon"><i class="fas fa-layer-group" [style.color]="ps.themeColor()"></i></div>
        <div>
          <h3>What I Build</h3>
          <p>Production-grade enterprise applications</p>
        </div>
      </div>
      <div class="callout-tags">
        <span *ngFor="let tag of buildTags" class="callout-tag">{{ tag }}</span>
      </div>
    </div>

  </div>
</section>
