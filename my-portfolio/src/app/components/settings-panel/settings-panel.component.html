<!-- Settings Overlay -->
<div
  class="overlay"
  *ngIf="ps.settingsPanelOpen()"
  (click)="ps.toggleSettings()"
></div>

<!-- Settings Panel -->
<div
  class="settings-panel"
  [class.open]="ps.settingsPanelOpen()"
  [class.dark]="ps.isDarkMode()"
>
  <div class="panel-header">
    <div class="panel-title">
      <i class="fas fa-sliders-h"></i>
      Preferences
    </div>
    <button class="close-btn" (click)="ps.toggleSettings()">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <!-- THEME COLOR -->
  <div class="panel-section">
    <div class="panel-section-label">Theme Color</div>
    <div class="color-grid">
      <button
        *ngFor="let color of ps.themeColors"
        class="color-swatch"
        [style.background]="color"
        [class.selected]="ps.themeColor() === color"
        (click)="ps.setThemeColor(color)"
        [title]="color"
      >
        <i class="fas fa-check" *ngIf="ps.themeColor() === color"></i>
      </button>
    </div>
  </div>

  <!-- DARK MODE -->
  <div class="panel-section">
    <div class="panel-section-label">Appearance</div>
    <div class="toggle-row" (click)="ps.toggleDarkMode()">
      <div class="toggle-info">
        <i [class]="ps.isDarkMode() ? 'fas fa-moon' : 'fas fa-sun'"></i>
        <span>{{ ps.isDarkMode() ? "Dark Mode" : "Light Mode" }}</span>
      </div>
      <div class="toggle-switch" [class.on]="ps.isDarkMode()">
        <div class="toggle-knob"></div>
      </div>
    </div>
  </div>

  <!-- NAVIGATE -->
  <div class="panel-section">
    <div class="panel-section-label">Quick Navigate</div>
    <div class="nav-list">
      <button
        *ngFor="let item of navItems"
        class="nav-item"
        [class.active]="ps.activeSection() === item.id"
        (click)="navigate(item.id)"
      >
        <i [class]="item.icon"></i> {{ item.label }}
      </button>
    </div>
  </div>
</div>
